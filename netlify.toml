[build]
  base    = "thaigigabike"
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Secrets scanning false positives:
  # - NEXT_PUBLIC_* vars are public by design (bundled into client JS / page
  #   metadata), so they always appear in build output.
  # - .env.example holds placeholder values, not real secrets.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"
  SECRETS_SCAN_OMIT_PATHS = ".env.example"

[[plugins]]
  package = "@netlify/plugin-nextjs"
